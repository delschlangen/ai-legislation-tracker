name: Update AI Legislation Data

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:  # Allow manual trigger
  push:
    paths:
      - '.github/workflows/update-legislation.yml'

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create cache directory
        run: mkdir -p .cache

      - name: Fetch Federal Register data (no key needed)
        run: python src/federal_register.py --output .cache/federal_register.json
        continue-on-error: true

      - name: Fetch Congress.gov data
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: python src/congress_gov.py --congress 118 --output .cache/congress_gov.json
        continue-on-error: true

      - name: Merge new data into tracker
        run: python src/merge_api_data.py

      - name: Regenerate dashboard data
        run: python src/generate_dashboard.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update: Fetch latest AI legislation data

          Automated update from Congress.gov and Federal Register APIs.

          https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            git push
          fi
